<style>
:root{
  --bg:#f8f9fa;--card:#fff;--border:#e9ecef;--text:#212529;--text2:#6c757d;

*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:auto}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-width:2260px}

.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:16px;font-weight:700}
.hdr-sub{font-size:10px;color:var(--text2)}
.back-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);text-decoration:none;padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:var(--bg)}
.back-link:hover{color:var(--accent);border-color:#bfdbfe}
.today-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}

.wrap{padding:12px 24px 32px}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:10px;font-size:10px;align-items:center}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Roadmap outer — overflow:clip 视觉裁剪圆角但不阻断 sticky */
.rm-outer{border:1px solid var(--border);border-radius:10px;overflow:clip;background:var(--card);box-shadow:var(--sh)}

/* Year header — top 由 JS 动态设置 */
.yr-row{display:flex;background:#f8fafc;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.yr-label{width:var(--LW);flex-shrink:0;padding:4px 10px;font-size:10px;font-weight:700;color:var(--text2);border-right:1px solid var(--border);background:#f8fafc;position:sticky;left:0;z-index:52}
.yr-cell{flex-shrink:0;font-size:10px;font-weight:700;color:var(--text2);text-align:center;border-right:1px solid #e9ecef;padding:4px 0;display:flex;align-items:center;justify-content:center}

/* Quarter header — top 由 JS 动态设置 */
.qtr-row{display:flex;background:#f1f5f9;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:50}
.qtr-label{width:var(--LW);flex-shrink:0;padding:5px 10px;font-size:10px;font-weight:700;color:var(--text2);border-right:1px solid var(--border);background:#f1f5f9;position:sticky;left:0;z-index:52}
.qtr-cell{width:var(--CW);flex-shrink:0;font-size:9px;font-weight:600;color:var(--text2);text-align:center;padding:5px 0;border-right:1px solid #e2e8f0}
.qtr-cell.now{background:#fff7ed;color:#ea580c;font-weight:800}

/* Group header */
.grp{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:11px;font-weight:700;border-bottom:1px solid var(--border);border-left:3px solid;cursor:pointer;user-select:none;width:100%}
.grp-arrow{margin-left:auto;font-size:10px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.grp.open .grp-arrow{transform:rotate(0deg)}
.grp.closed .grp-arrow{transform:rotate(-90deg)}
.grp-desc{font-size:9px;font-weight:400;color:var(--text2)}

/* Data rows */
.rm-row{display:flex;border-bottom:1px solid #f1f5f9;align-items:stretch}
.rm-row.hidden{display:none}
.rm-row:hover{background:#fafbfc}
.rm-lbl{width:var(--LW);flex-shrink:0;padding:0 10px;font-size:10px;color:var(--text2);border-right:1px solid var(--border);display:flex;align-items:center;position:sticky;left:0;background:var(--card);z-index:10}
.rm-row:hover .rm-lbl{background:#fafbfc}
.rm-lbl.sub{color:#94a3b8;font-size:9px}
.rm-track{flex-shrink:0;width:calc(28 * var(--CW));position:relative}

.rm-row{min-height:34px}

/* Column grid */
.col-line{position:absolute;top:0;bottom:0;width:1px;pointer-events:none}

/* TODAY line */
.now-line{position:absolute;top:0;bottom:0;width:2px;background:linear-gradient(180deg,#f97316,#ea580c);z-index:8;pointer-events:none}

/* Chips */
.chip{position:absolute;top:50%;transform:translateY(-50%);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:600;border:1px solid transparent;white-space:nowrap;cursor:default;z-index:5;line-height:1.5;max-width:calc(var(--CW) - 2px);overflow:hidden;text-overflow:ellipsis}
.chip:hover{z-index:20;max-width:none;overflow:visible;box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* future chips slightly dimmed */
.chip.future{opacity:.75;border-style:dashed}

/* note text in track */
.note-txt{position:absolute;top:50%;transform:translateY(-50%);font-size:8px;font-weight:500;white-space:nowrap;pointer-events:none}

.hint{margin-top:8px;font-size:10px;color:var(--text2);text-align:right}
</style>

/* ─── Render functions ─────────────────────────────────── */
const CW_PX = `${CW}px`;

function todayX(){ return TODAY * CW + CW/2; }

function colLines(){
  let s='';
  for(let i=0;i<N;i++){
    const yr = i%4===0;
    s+=`<div class="col-line" style="left:${i*CW}px;background:${yr?'#e2e8f0':'#f1f5f9'}"></div>`;
  }
  s+=`<div class="now-line" style="left:${todayX()}px"></div>`;
  return s;
}

function renderChip(m, gid){
  const g=G[gid];
  const c  = m.c  || g.color;
  const bg = m.bg || g.bg;
  const x=m.idx*CW+1;
  const cls=m.future?'chip future':'chip';
  const border=m.future?`border-color:${c}55`:`border-color:${c}40`;
  return `<div class="${cls}" style="left:${x}px;background:${bg};color:${c};${border}" title="${m.tip}">${m.text}</div>`;
}

function renderRow(row){
  const g=G[row.group];
  const isSub=!!row.sub;
  const grpDef=GROUPS.find(gg=>gg.id===row.group);
  const hidden=(isSub && grpDef.coll)?'hidden':'';

  let track=colLines();

  // 代际背景色带：全高，从 eraBand.s 列延伸到 eraBand.e 列
  if(row.eraBand){
    const b=row.eraBand;
    const l=b.s*CW, w=(b.e-b.s+1)*CW;
    track+=`<div style="position:absolute;top:0;bottom:0;left:${l}px;width:${w}px;background:${b.c};z-index:1;pointer-events:none;border-radius:2px"></div>`;
  }

  row.milestones.forEach(m=>{ track+=renderChip(m,row.group); });

  const lblCls=isSub?'rm-lbl sub':'rm-lbl';
  const prefix=isSub?'<span style="margin-right:3px;color:#cbd5e1">└</span>':'';

  // 有 eraBand 的行：左侧 label 加对应颜色细线
  const lblStyle=row.eraBand?`border-left:3px solid ${row.eraBand.tc};`:'';

  return `<div class="rm-row ${hidden}" id="${row.id}" data-group="${row.group}" data-sub="${isSub?1:0}">
    <div class="${lblCls}" style="${lblStyle}">${prefix}${row.label}</div>
    <div class="rm-track">${track}</div>
  </div>`;
}

function renderGrpHdr(grp){
  const g=G[grp.id];
  const open=grp.coll?'closed':'open';
  const arrow=grp.coll?'▸':'▾';
  return `<div class="grp ${open}" id="grp-${grp.id}" style="border-left-color:${g.color};background:${g.bar}18" onclick="toggleGrp('${grp.id}')">
    <span style="color:${g.color};font-size:12px">●</span>
    <span>${grp.label}</span>
    <span class="grp-desc">${grp.desc}</span>
    <span class="grp-arrow" id="arr-${grp.id}">${arrow}</span>
  </div>`;
}

/* Build year + quarter header */
function buildHeader(){
  let yr=`<div class="yr-row"><div class="yr-label">赛道</div>`;
  YEARS.forEach(({y,n})=>{ yr+=`<div class="yr-cell" style="width:${n*CW}px">${y}</div>`; });
  yr+='</div>';

  let qtr=`<div class="qtr-row"><div class="qtr-label">年份/季度</div>`;
  QTRS.forEach((q,i)=>{ qtr+=`<div class="qtr-cell${i===TODAY?' now':''}">${q}</div>`; });
  qtr+='</div>';

  return yr+qtr;
}

/* Assemble */
let html=buildHeader();
let lastGrp=null;
ROWS.forEach(row=>{
  if(row.group!==lastGrp){
    const grp=GROUPS.find(g=>g.id===row.group);
    if(grp) html+=renderGrpHdr(grp);
    lastGrp=row.group;
  }
  html+=renderRow(row);
});
document.getElementById('rm-outer').innerHTML=html;

/* Toggle */
function toggleGrp(gid){
  const grp=GROUPS.find(g=>g.id===gid);
  if(!grp||!grp.coll) return;
  if(grp.collapsed===undefined) grp.collapsed=true; // starts collapsed
  grp.collapsed=!grp.collapsed;
  const newCollapsed=grp.collapsed;
  document.querySelectorAll(`.rm-row[data-group="${gid}"][data-sub="1"]`).forEach(el=>{
    el.classList.toggle('hidden',newCollapsed);
  });
  const hdrEl=document.getElementById('grp-'+gid);
  const arrEl=document.getElementById('arr-'+gid);
  if(hdrEl) hdrEl.className=`grp ${newCollapsed?'closed':'open'}`;
  if(arrEl) arrEl.textContent=newCollapsed?'▸':'▾';
}

/* 动态计算 sticky top，避免被页面 header 遮挡 */
(function setStickyTops(){
  const hdrH = document.querySelector('.hdr').offsetHeight;
  const yrEl  = document.querySelector('.yr-row');
  const qtrEl = document.querySelector('.qtr-row');
  if(yrEl)  yrEl.style.top  = hdrH + 'px';
  if(qtrEl && yrEl) qtrEl.style.top = (hdrH + yrEl.offsetHeight) + 'px';
})();

/* Legend */

  <div class="leg"><div class="leg-dot" style="background:${v.bar}"></div>
  <span style="color:${v.color};font-weight:600;font-size:10px">${v.name}</span></div>`).join('')+`

    <div style="width:14px;height:10px;border-radius:2px;background:linear-gradient(90deg,#f97316,#ea580c)"></div>
    <span style="color:#ea580c;font-weight:600;font-size:10px">当前时间点</span>
  </div>
  <div class="leg">
    <div style="width:14px;height:10px;border-radius:2px;border:1px dashed #94a3b8;background:#f8fafc"></div>
    <span style="color:#94a3b8;font-size:10px">预测节点（虚线边框）</span>
  </div>`;
